  <script type="text/babel">
    const { useState, useEffect } = React;

    // Error boundary — prevents blank screen if any component throws
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('WICE app error:', error, info); }
      render() {
        if (this.state.error) {
          return (
            <div style={{ padding: 40, fontFamily: 'system-ui, sans-serif', maxWidth: 600, margin: '40px auto' }}>
              <h2 style={{ color: '#0a2540' }}>Algo salió mal cargando la página</h2>
              <p style={{ color: '#475569', marginTop: 12 }}>Por favor recarga la página. Si el problema persiste, escríbenos por WhatsApp al +52 33 2213 0778.</p>
              <button onClick={() => { try { localStorage.removeItem('wice-route'); } catch(e){} location.reload(); }} style={{ marginTop: 16, padding: '10px 18px', background: '#0a2540', color: '#fff', border: 0, borderRadius: 8, cursor: 'pointer' }}>Recargar</button>
              <pre style={{ marginTop: 24, padding: 12, background: '#f1f5f9', borderRadius: 8, fontSize: 12, overflow: 'auto' }}>{String(this.state.error && this.state.error.message)}</pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function App() {
      const [route, setRoute] = useState('home');
      const [apply, setApply] = useState({ open: false, program: '', locked: false });

      // Persist route across reloads (defensive: localStorage may be unavailable
      // in incognito / sandboxed iframes / strict cookie settings)
      useEffect(() => {
        try {
          const saved = localStorage.getItem('wice-route');
          if (saved) setRoute(saved);
        } catch (e) { /* no-op */ }
      }, []);
      useEffect(() => {
        try { localStorage.setItem('wice-route', route); } catch (e) { /* no-op */ }
        try { window.scrollTo({ top: 0, behavior: 'instant' }); } catch (e) { window.scrollTo(0, 0); }
      }, [route]);

      const navigate = (r) => setRoute(r);
      const openApply = (program = '', locked = false) => setApply({ open: true, program, locked });
      const closeApply = () => setApply({ open: false, program: '', locked: false });

      let page;
      if (route === 'home') page = <Home navigate={navigate} openApply={openApply} />;
      else if (route === 'programs') page = <ProgramsPage navigate={navigate} openApply={openApply} />;
      else if (route === 'employers') page = <EmployersPage navigate={navigate} openApply={openApply} />;
      else if (route === 'visa') page = <VisaPage openApply={() => openApply()} />;
      else if (route === 'process') page = <ProcessPage navigate={navigate} />;
      else if (route === 'booking') page = <BookingPage navigate={navigate} />;
      else if (route === 'team') page = <TeamPage />;
      else if (route === 'testimonials') page = <TestimonialsPage />;
      else if (route === 'faq') page = <FAQPage />;
      else if (route === 'contact') page = <ContactPage openApply={() => openApply()} navigate={navigate} />;
      else if (route === 'terms') page = <Terms />;
      else if (route.startsWith('program-')) {
        const id = route.replace('program-', '');
        page = <ProgramPage program={id} navigate={navigate} openApply={(pid) => openApply(pid || id, true)} />;
      } else page = <Home navigate={navigate} openApply={openApply} />;

      return (
        <>
          <Header route={route} navigate={navigate} openApply={() => openApply()} />
          {page}
          <Footer navigate={navigate} openApply={() => openApply()} />
          <Fab />
          <ApplyModal open={apply.open} onClose={closeApply} defaultProgram={apply.locked ? '' : apply.program} initialProgram={apply.locked ? apply.program : ''} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary>
        <LangProvider>
          <App />
        </LangProvider>
      </ErrorBoundary>
    );
  </script>
  <!-- ============================================================
       COOKIE CONSENT BANNER
       Loads instantly (no React dependency). Auto-detects language
       from <html lang>, browser, or saved preference. Shows once.
       ============================================================ -->
  <div id="wice-cookies" role="dialog" aria-live="polite" aria-label="Aviso de cookies">
    <div class="cookie-head">
      <div class="cookie-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10c0-.5-.04-1-.1-1.5a4 4 0 0 1-5.4-5.4A10 10 0 0 0 12 2z"/>
          <circle cx="8.5" cy="10.5" r="0.5" fill="currentColor"/>
          <circle cx="15" cy="14" r="0.5" fill="currentColor"/>
          <circle cx="10" cy="15.5" r="0.5" fill="currentColor"/>
        </svg>
      </div>
      <h3 id="wice-cookies-title">Usamos cookies</h3>
    </div>
    <p id="wice-cookies-body">
      Utilizamos cookies para mejorar tu experiencia, recordar tus preferencias y entender cómo usas el sitio. Puedes aceptar todas o solo permitir las esenciales. <a href="privacidad/" class="cookie-link" id="wice-cookies-link">Más información</a>.
    </p>
    <div class="cookie-actions">
      <button type="button" class="cookie-secondary" id="wice-cookies-essential">Solo necesarias</button>
      <button type="button" class="cookie-primary"   id="wice-cookies-accept">Aceptar todas</button>
    </div>
  </div>

  <script>
    (function () {
      // Bail out if user has already chosen (decision is permanent until they clear storage)
      try {
        if (localStorage.getItem('wice-cookies-consent')) return;
      } catch (e) { /* localStorage blocked, show banner anyway */ }

      // Detect language: explicit lang attr → saved site lang → browser language
      var lang = 'es';
      try {
        var htmlLang = document.documentElement.lang || '';
        var savedLang = localStorage.getItem('wice-lang') || '';
        var navLang = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
        if (savedLang === 'en') lang = 'en';
        else if (savedLang === 'es') lang = 'es';
        else if (htmlLang.toLowerCase().indexOf('en') === 0) lang = 'en';
        else if (navLang.indexOf('es') !== 0) lang = 'en';
      } catch (e) { /* default to es */ }

      var copy = {
        es: {
          title: 'Usamos cookies',
          bodyA: 'Utilizamos cookies para mejorar tu experiencia, recordar tus preferencias y entender cómo usas el sitio. Puedes aceptar todas o solo permitir las esenciales.',
          link: 'Más información',
          essential: 'Solo necesarias',
          accept: 'Aceptar todas'
        },
        en: {
          title: 'We use cookies',
          bodyA: 'We use cookies to improve your experience, remember your preferences, and understand how you use the site. You can accept all or only allow the essential ones.',
          link: 'Learn more',
          essential: 'Only essential',
          accept: 'Accept all'
        }
      };
      var t = copy[lang];

      var el     = document.getElementById('wice-cookies');
      var title  = document.getElementById('wice-cookies-title');
      var body   = document.getElementById('wice-cookies-body');
      var link   = document.getElementById('wice-cookies-link');
      var btnEss = document.getElementById('wice-cookies-essential');
      var btnAll = document.getElementById('wice-cookies-accept');

      title.textContent  = t.title;
      // Rebuild body so the link stays clickable after text swap
      body.innerHTML = t.bodyA + ' <a href="privacidad/" class="cookie-link">' + t.link + '</a>.';
      btnEss.textContent = t.essential;
      btnAll.textContent = t.accept;

      function dismiss(choice) {
        try { localStorage.setItem('wice-cookies-consent', choice); } catch (e) {}
        try { localStorage.setItem('wice-cookies-consent-date', new Date().toISOString()); } catch (e) {}
        el.classList.remove('is-visible');
        // Remove from DOM after the fade-out finishes
        setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 500);
        // Dispatch a custom event so the rest of the app (e.g. analytics) can react
        try {
          window.dispatchEvent(new CustomEvent('wice-cookies-consent', { detail: { choice: choice } }));
        } catch (e) {}
      }

      btnAll.addEventListener('click', function () { dismiss('all'); });
      btnEss.addEventListener('click', function () { dismiss('essential'); });

      // Show the banner ~1.4s after the page loads (gives the hero a moment to settle)
      setTimeout(function () { el.classList.add('is-visible'); }, 1400);
    })();
  </script>

</body>
</html>
