<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WICE MX — Vive tu intercambio cultural en USA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="WICE MX" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Calendly widget assets — popup scheduler + inline embed -->
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
  <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
  <script>
    // Replace each PLACEHOLDER with the actual Calendly Group Event URL for that program.
    // Example: 'https://calendly.com/wice-mx/swt-llamada-informativa'
    window.CALENDLY_URLS = {
      swt:     'CALENDLY_URL_SWT_PLACEHOLDER',
      camp:    'CALENDLY_URL_CAMP_PLACEHOLDER',
      intern:  'CALENDLY_URL_INTERN_PLACEHOLDER',
      support: 'CALENDLY_URL_SUPPORT_PLACEHOLDER',
    };
    window.getCalendlyUrl = function (programId) {
      var url = window.CALENDLY_URLS && window.CALENDLY_URLS[programId];
      if (url && url.indexOf('PLACEHOLDER') === -1) return url;
      return null;
    };
  </script>
  <style>
    /* Critical inline CSS — applied immediately to prevent FOUC */
    body { font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .logo img { height: 92px; width: auto; display: block; }
    .header { height: 116px; }

    /* Page-specific responsive */
    @media (max-width: 1080px) {
      .employers-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 960px) {
      .hero-copy { grid-column: span 12 !important; }
      .hero-art { grid-column: span 12 !important; max-width: 480px; margin: 32px auto 0; }
      .stats { grid-template-columns: repeat(2, 1fr) !important; gap: 24px !important; }
      .about-grid, .visa-grid, .faq-grid, .contact-grid, .prog-desc, .program-hero { grid-template-columns: 1fr !important; gap: 40px !important; }
      .programs-grid, .team-grid, .testimonials-grid, .process-grid, .prog-cards, .program-meta, .booking-grid { grid-template-columns: 1fr !important; }
    }
    @media (min-width: 720px) and (max-width: 960px) {
      .programs-grid, .team-grid, .booking-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .testimonials-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .process-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .prog-cards { grid-template-columns: 1fr !important; }
      .program-meta { grid-template-columns: repeat(3, 1fr) !important; }
    }

    /* ===== MOBILE (≤720px) — swipeable carousels for card grids ===== */
    @media (max-width: 720px) {
      /* Convert card grids into horizontal scroll-snap carousels */
      .programs-grid,
      .team-grid,
      .testimonials-grid,
      .booking-grid {
        display: flex !important;
        flex-direction: row !important;
        grid-template-columns: none !important;
        overflow-x: auto;
        overflow-y: visible;
        scroll-snap-type: x mandatory;
        gap: 14px !important;
        padding: 4px 20px 24px;
        margin: 0 -20px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .programs-grid::-webkit-scrollbar,
      .team-grid::-webkit-scrollbar,
      .testimonials-grid::-webkit-scrollbar,
      .booking-grid::-webkit-scrollbar { display: none; }
      .programs-grid > *,
      .team-grid > *,
      .testimonials-grid > *,
      .booking-grid > * {
        flex: 0 0 84% !important;
        min-width: 0;
        scroll-snap-align: start;
      }

      /* Process steps and employers stay stacked (better for sequential / categorized content) */
      .process-grid { grid-template-columns: 1fr !important; gap: 14px !important; }
      .employers-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }

      /* Typography — compact for mobile but still impactful */
      h1 { font-size: clamp(32px, 9vw, 44px) !important; line-height: 1.08 !important; letter-spacing: -0.02em !important; }
      h2 { font-size: clamp(26px, 7vw, 34px) !important; line-height: 1.12 !important; }
      h3 { font-size: 20px !important; line-height: 1.2 !important; }
      .lead { font-size: 15px !important; line-height: 1.55 !important; }

      /* Container padding tighter */
      .container { padding-left: 20px !important; padding-right: 20px !important; }

      /* About photos: simple 2x2 without offsets so nothing overlaps weird */
      .about-photo { margin-top: 0 !important; }

      /* Hide the desktop-only "Hablar con asesor" button in header */
      .desktop-only { display: none !important; }

      /* Hero badge slightly smaller */
      .pill { font-size: 11px !important; padding: 6px 12px !important; }

      /* Stats grid: 2 columns on mobile */
      .stats { grid-template-columns: repeat(2, 1fr) !important; gap: 20px !important; margin-top: 56px !important; }

      /* Buttons full-width-ish in mobile */
      .btn-lg { padding: 14px 20px !important; font-size: 14px !important; }

      /* Section vertical rhythm: less padding so user sees more content */
      section { padding-top: 64px !important; padding-bottom: 8px !important; }
    }

    /* ===== Very small (≤480px) ===== */
    @media (max-width: 480px) {
      h1 { font-size: clamp(28px, 8.5vw, 36px) !important; }
      h2 { font-size: clamp(24px, 6.8vw, 30px) !important; }
      .employers-grid { grid-template-columns: 1fr !important; }
      /* Hero CTAs stack full-width */
      .hero-copy .btn-lg { flex: 1 1 100%; justify-content: center; }
    }

    /* Subtle scroll affordance: faded edge on mobile carousels to hint horizontal scroll */
    @media (max-width: 720px) {
      .programs-grid,
      .team-grid,
      .testimonials-grid,
      .booking-grid {
        scroll-padding-left: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="translations.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="apply-config.jsx"></script>
  <script type="text/babel" src="apply-fields.jsx"></script>
  <script type="text/babel" src="apply-modal.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="program.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Error boundary — prevents blank screen if any component throws
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('WICE app error:', error, info); }
      render() {
        if (this.state.error) {
          return (
            <div style={{ padding: 40, fontFamily: 'system-ui, sans-serif', maxWidth: 600, margin: '40px auto' }}>
              <h2 style={{ color: '#0a2540' }}>Algo salió mal cargando la página</h2>
              <p style={{ color: '#475569', marginTop: 12 }}>Por favor recarga la página. Si el problema persiste, escríbenos por WhatsApp al +52 33 2213 0778.</p>
              <button onClick={() => { try { localStorage.removeItem('wice-route'); } catch(e){} location.reload(); }} style={{ marginTop: 16, padding: '10px 18px', background: '#0a2540', color: '#fff', border: 0, borderRadius: 8, cursor: 'pointer' }}>Recargar</button>
              <pre style={{ marginTop: 24, padding: 12, background: '#f1f5f9', borderRadius: 8, fontSize: 12, overflow: 'auto' }}>{String(this.state.error && this.state.error.message)}</pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function App() {
      const [route, setRoute] = useState('home');
      const [apply, setApply] = useState({ open: false, program: '', locked: false });

      // Persist route across reloads (defensive: localStorage may be unavailable
      // in incognito / sandboxed iframes / strict cookie settings)
      useEffect(() => {
        try {
          const saved = localStorage.getItem('wice-route');
          if (saved) setRoute(saved);
        } catch (e) { /* no-op */ }
      }, []);
      useEffect(() => {
        try { localStorage.setItem('wice-route', route); } catch (e) { /* no-op */ }
        try { window.scrollTo({ top: 0, behavior: 'instant' }); } catch (e) { window.scrollTo(0, 0); }
      }, [route]);

      const navigate = (r) => setRoute(r);
      const openApply = (program = '', locked = false) => setApply({ open: true, program, locked });
      const closeApply = () => setApply({ open: false, program: '', locked: false });

      let page;
      if (route === 'home') page = <Home navigate={navigate} openApply={openApply} />;
      else if (route === 'programs') page = <ProgramsPage navigate={navigate} openApply={openApply} />;
      else if (route === 'employers') page = <EmployersPage navigate={navigate} openApply={openApply} />;
      else if (route === 'visa') page = <VisaPage openApply={() => openApply()} />;
      else if (route === 'process') page = <ProcessPage navigate={navigate} />;
      else if (route === 'booking') page = <BookingPage navigate={navigate} />;
      else if (route === 'team') page = <TeamPage />;
      else if (route === 'testimonials') page = <TestimonialsPage />;
      else if (route === 'faq') page = <FAQPage />;
      else if (route === 'contact') page = <ContactPage openApply={() => openApply()} navigate={navigate} />;
      else if (route === 'terms') page = <Terms />;
      else if (route.startsWith('program-')) {
        const id = route.replace('program-', '');
        page = <ProgramPage program={id} navigate={navigate} openApply={(pid) => openApply(pid || id, true)} />;
      } else page = <Home navigate={navigate} openApply={openApply} />;

      return (
        <>
          <Header route={route} navigate={navigate} openApply={() => openApply()} />
          {page}
          <Footer navigate={navigate} openApply={() => openApply()} />
          <Fab />
          <ApplyModal open={apply.open} onClose={closeApply} defaultProgram={apply.locked ? '' : apply.program} initialProgram={apply.locked ? apply.program : ''} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary>
        <LangProvider>
          <App />
        </LangProvider>
      </ErrorBoundary>
    );
  </script>
</body>
</html>
